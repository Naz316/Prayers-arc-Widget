<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Arc · Perfectly Aligned</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #0f172a;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        width: 100vw;
        font-family: 'Roboto', sans-serif;
        overflow: hidden;
    }

    [lang="ar"] { font-family: 'Cairo', sans-serif; }

    /* The Main Container filling the screen */
    .arc-widget {
        width: 100vw;
        height: 100vh;
        position: relative;
        background: linear-gradient(180deg, #1e293b, #0f172a);
        transition: background 1s ease;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Dynamic Gradients */
    .bg-fajr { background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); }
    .bg-sunrise { background: linear-gradient(180deg, #0369a1 0%, #0ea5e9 100%); }
    .bg-dhuhr { background: linear-gradient(180deg, #38bdf8 0%, #0284c7 100%); }
    .bg-asr { background: linear-gradient(180deg, #6366f1 0%, #4338ca 100%); }
    .bg-maghrib { background: linear-gradient(180deg, #f43f5e 0%, #9f1239 100%); }
    .bg-isha { background: linear-gradient(180deg, #1e1b4b 0%, #0f172a 100%); }

    /* SVG - Stays centered and responsive */
    .arc-svg {
        position: absolute;
        width: 90%;
        max-width: 1000px;
        height: auto;
        z-index: 1;
        overflow: visible;
    }

    .track {
        stroke: rgba(255, 255, 255, 0.15);
        stroke-width: 12;
        fill: none;
        stroke-linecap: round;
    }

    .progress {
        stroke: white;
        stroke-width: 12;
        fill: none;
        stroke-linecap: round;
        filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.6));
    }

    /* Moving progress dot "0" */
    #bead {
        position: absolute;
        width: 20px;
        height: 20px;
        background: white;
        border-radius: 50%;
        box-shadow: 0 0 20px white, 0 0 0 6px rgba(255,255,255,0.2);
        z-index: 30;
        transform: translate(-50%, -50%);
        pointer-events: none;
    }

    /* Center Info */
    .center-info {
        position: absolute;
        text-align: center;
        color: white;
        z-index: 2;
        transform: translateY(20px);
    }
    .prayer-name { font-size: 2.5rem; font-weight: 500; text-transform: uppercase; letter-spacing: 2px; }
    .prayer-time { font-size: 7rem; font-weight: 700; line-height: 0.9; margin: 10px 0; }
    .city-name { font-size: 1.8rem; opacity: 0.7; }

    /* Icons Snapped to Line */
    .prayer-icon {
        position: absolute;
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        transform: translate(-50%, -50%);
        z-index: 20;
        transition: all 0.3s ease;
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }
    .prayer-icon img { width: 38px; height: 38px; }

    .prayer-icon.current {
        background: #fbbf24;
        width: 90px;
        height: 90px;
        box-shadow: 0 0 40px #fbbf24;
        border: 5px solid white;
    }
    .prayer-icon.current img { width: 50px; height: 50px; }

    /* Controls */
    .top-left, .top-right {
        position: absolute;
        top: 30px;
        z-index: 100;
        width: 65px;
        height: 65px;
        border-radius: 50%;
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.3s;
    }
    .top-left { left: 30px; }
    .top-right { right: 30px; }
    .top-left:hover, .top-right:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
    .top-left img, .top-right img { width: 32px; height: 32px; filter: invert(1); }
</style>
</head>

<body>

<div class="arc-widget" id="widget">

    <div class="top-left" onclick="toggleLang()">
        <img src="https://cdn-icons-png.flaticon.com/128/18882/18882472.png">
    </div>
    <div class="top-right" onclick="window.location.reload()">
        <img src="https://cdn-icons-png.flaticon.com/128/9311/9311549.png">
    </div>

    <!-- The Progress Bead "0" -->
    <div id="bead"></div>

    <svg class="arc-svg" viewBox="0 0 380 240" id="svgElement">
        <path id="masterPath" class="track" d="M 30 170 L 90 170 A 100 100 0 0 1 290 170 L 350 170"/>
        <path id="fillPath" class="progress" d="M 30 170 L 90 170 A 100 100 0 0 1 290 170 L 350 170"/>
    </svg>

    <!-- Icons -->
    <div class="prayer-icon" id="icon-fajr"><img src="https://cdn-icons-png.flaticon.com/128/4067/4067304.png"></div>
    <div class="prayer-icon" id="icon-sunrise"><img src="https://cdn-icons-png.flaticon.com/128/11546/11546454.png"></div>
    <div class="prayer-icon" id="icon-dhuhr"><img src="https://cdn-icons-png.flaticon.com/128/1004/1004519.png"></div>
    <div class="prayer-icon" id="icon-asr"><img src="https://cdn-icons-png.flaticon.com/128/3313/3313911.png"></div>
    <div class="prayer-icon" id="icon-maghrib"><img src="https://cdn-icons-png.flaticon.com/128/8840/8840934.png"></div>
    <div class="prayer-icon" id="icon-isha"><img src="https://cdn-icons-png.flaticon.com/128/2116/2116201.png"></div>

    <div class="center-info">
        <div class="prayer-name" id="prayer-name">--</div>
        <div class="prayer-time" id="prayer-time">--:--</div>
        <div class="city-name" id="city-display">Ain Oussera</div>
    </div>

</div>

<script>
const PRAYERS = ["Fajr", "Sunrise", "Dhuhr", "Asr", "Maghrib", "Isha"];
const NODES = { "Fajr": 0, "Sunrise": 0.15, "Dhuhr": 0.50, "Asr": 0.72, "Maghrib": 0.85, "Isha": 1 };
const TRANSLATIONS = {
    en: { Fajr: "Fajr", Sunrise: "Sunrise", Dhuhr: "Dhuhr", Asr: "Asr", Maghrib: "Maghrib", Isha: "Isha", city: "Ain Oussera" },
    ar: { Fajr: "الفجر", Sunrise: "الشروق", Dhuhr: "الظهر", Asr: "العصر", Maghrib: "المغرب", Isha: "العشاء", city: "عين وسارة" }
};

const MASTER_PATH = document.getElementById("masterPath");
const FILL_PATH = document.getElementById("fillPath");
const SVG = document.getElementById("svgElement");
let state = { timings: null, lang: 'en' };

// CRITICAL FIX: Snaps elements based on SVG scaling
function snapToLine() {
    const pathLen = MASTER_PATH.getTotalLength();
    const rect = SVG.getBoundingClientRect();
    
    // Scaling factor (current screen width vs virtual 380px)
    const scale = rect.width / 380;
    
    // Offset to find the top-left of the centered SVG
    const offsetX = rect.left;
    const offsetY = rect.top;

    // Position Icons
    PRAYERS.forEach(p => {
        const perc = NODES[p];
        const pt = MASTER_PATH.getPointAtLength(perc * pathLen);
        const el = document.getElementById("icon-" + p.toLowerCase());
        
        el.style.left = (pt.x * scale + offsetX) + "px";
        el.style.top = (pt.y * scale + offsetY) + "px";
    });

    // Position Bead "0"
    updateBead(pathLen, scale, offsetX, offsetY);
}

function updateBead(pathLen, scale, offsetX, offsetY) {
    if (!state.timings) return;
    const now = new Date();
    const minsNow = now.getHours() * 60 + now.getMinutes();

    let next = "Fajr", prev = "Isha";
    for(let i=0; i<PRAYERS.length; i++) {
        const pm = toMin(state.timings[PRAYERS[i]]);
        if (pm > minsNow) {
            next = PRAYERS[i];
            prev = PRAYERS[i-1] || "Isha";
            break;
        }
    }

    const startPerc = NODES[prev];
    const endPerc = NODES[next];
    const tStart = toMin(state.timings[prev]);
    let tEnd = toMin(state.timings[next]);
    if (tEnd < tStart) tEnd += 1440;

    const progress = Math.max(0, Math.min(1, (minsNow - tStart) / (tEnd - tStart)));
    const totalPerc = startPerc + (progress * (endPerc - startPerc));

    // Move Bead
    const pt = MASTER_PATH.getPointAtLength(totalPerc * pathLen);
    const bead = document.getElementById("bead");
    bead.style.left = (pt.x * scale + offsetX) + "px";
    bead.style.top = (pt.y * scale + offsetY) + "px";

    // Update Path Fill
    FILL_PATH.style.strokeDasharray = pathLen;
    FILL_PATH.style.strokeDashoffset = pathLen * (1 - totalPerc);

    // Update Text
    document.getElementById("prayer-time").innerText = state.timings[next];
    document.getElementById("prayer-name").innerText = TRANSLATIONS[state.lang][next];
    document.getElementById("widget").className = `arc-widget bg-${next.toLowerCase()}`;
    
    document.querySelectorAll('.prayer-icon').forEach(el => el.classList.remove('current'));
    document.getElementById("icon-" + next.toLowerCase()).classList.add('current');
}

function toMin(t) { const [h, m] = t.split(":").map(Number); return h * 60 + m; }

async function fetchData() {
    const res = await fetch("https://api.aladhan.com/v1/timingsByCity?city=Ain%20Oussera&country=Algeria&method=19");
    const data = await res.json();
    state.timings = data.data.timings;
    snapToLine();
}

function toggleLang() {
    state.lang = state.lang === 'en' ? 'ar' : 'en';
    document.getElementById("city-display").innerText = TRANSLATIONS[state.lang].city;
    snapToLine();
}

window.onload = fetchData;
setInterval(snapToLine, 1000);
window.addEventListener('resize', snapToLine);
</script>

</body>
</html>
