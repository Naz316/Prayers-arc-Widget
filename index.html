<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proportional Prayer Arc</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
        width: 100%; height: 100%;
        overflow: hidden; background: transparent;
    }

    .arc-widget {
        width: 100%; height: 100%;
        position: relative;
        display: flex; justify-content: center; align-items: center;
        background: linear-gradient(180deg, #1e293b, #0f172a);
        transition: background 1s ease;
        border-radius: 20px;
    }

    /* Gradients */
    .bg-fajr { background: linear-gradient(180deg, #141e30, #243b55); }
    .bg-sunrise { background: linear-gradient(180deg, #3a7bd5, #00d2ff); }
    .bg-dhuhr { background: linear-gradient(180deg, #4A90E2, #3478c9); }
    .bg-asr { background: linear-gradient(180deg, #517fa4, #243949); }
    .bg-maghrib { background: linear-gradient(180deg, #e65245, #b33939); }
    .bg-isha { background: linear-gradient(180deg, #0f0c29, #302b63); }

    .arc-svg {
        position: absolute;
        width: 90%; height: 90%;
        z-index: 1; overflow: visible;
    }

    .track { stroke: rgba(255, 255, 255, 0.2); fill: none; stroke-linecap: round; }
    .progress { stroke: white; fill: none; stroke-linecap: round; filter: drop-shadow(0 0 10px rgba(255,255,255,0.6)); }

    .center-info {
        position: absolute; text-align: center; color: white; z-index: 2;
    }

    #bead, .prayer-icon, .top-left, .top-right { position: absolute; transform: translate(-50%, -50%); z-index: 10; }

    #bead { background: white; border-radius: 50%; box-shadow: 0 0 15px white; }
    
    .prayer-icon { 
        border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: all 0.3s ease; 
    }
    .prayer-icon img { width: 62%; height: 62%; }
    .prayer-icon.current { background: #fbbf24; border: 2.5px solid white; box-shadow: 0 0 25px #fbbf24; }

    .top-left, .top-right { 
        background: rgba(255,255,255,0.12); border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
        display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(5px);
    }
    .top-left img, .top-right img { width: 55%; filter: invert(1); }
</style>
</head>

<body>

<div class="arc-widget" id="widget">
    <div class="top-left" id="langBtn" onclick="toggleLang()"><img src="https://cdn-icons-png.flaticon.com/128/18882/18882472.png"></div>
    <div class="top-right" id="refreshBtn" onclick="window.location.reload()"><img src="https://cdn-icons-png.flaticon.com/128/9311/9311549.png"></div>

    <div id="bead"></div>

    <svg class="arc-svg" viewBox="0 0 380 240" id="svgElement">
        <path id="masterPath" class="track" d="M 35 170 L 95 170 A 100 100 0 0 1 285 170 L 345 170"/>
        <path id="fillPath" class="progress" d="M 35 170 L 95 170 A 100 100 0 0 1 285 170 L 345 170"/>
    </svg>

    <!-- Icons -->
    <div class="prayer-icon" id="icon-fajr"><img src="https://cdn-icons-png.flaticon.com/128/4067/4067304.png"></div>
    <div class="prayer-icon" id="icon-sunrise"><img src="https://cdn-icons-png.flaticon.com/128/11546/11546454.png"></div>
    <div class="prayer-icon" id="icon-dhuhr"><img src="https://cdn-icons-png.flaticon.com/128/1004/1004519.png"></div>
    <div class="prayer-icon" id="icon-asr"><img src="https://cdn-icons-png.flaticon.com/128/3313/3313911.png"></div>
    <div class="prayer-icon" id="icon-maghrib"><img src="https://cdn-icons-png.flaticon.com/128/8840/8840934.png"></div>
    <div class="prayer-icon" id="icon-isha"><img src="https://cdn-icons-png.flaticon.com/128/2116/2116201.png"></div>

    <div class="center-info" id="info">
        <div id="p-name" class="prayer-name" style="font-weight: 700;">--</div>
        <div id="p-time" class="prayer-time">--:--</div>
        <div id="p-city" class="city-name">Ain Oussera</div>
    </div>
</div>

<script>
const PRAYERS = ["fajr", "sunrise", "dhuhr", "asr", "maghrib", "isha"];
const NODES = { "fajr": 0, "sunrise": 0.16, "dhuhr": 0.50, "asr": 0.70, "maghrib": 0.84, "isha": 1 };
const TRANSLATIONS = {
    en: { fajr: "Fajr", sunrise: "Sunrise", dhuhr: "Dhuhr", asr: "Asr", maghrib: "Maghrib", isha: "Isha", city: "Ain Oussera" },
    ar: { fajr: "الفجر", sunrise: "الشروق", dhuhr: "الظهر", asr: "العصر", maghrib: "المغرب", isha: "العشاء", city: "عين وسارة" }
};

const MASTER_PATH = document.getElementById("masterPath");
const FILL_PATH = document.getElementById("fillPath");
const SVG = document.getElementById("svgElement");
let state = { timings: null, lang: 'en' };

function updateLayout() {
    const rect = SVG.getBoundingClientRect();
    const scale = rect.width / 380; 
    const pathLen = MASTER_PATH.getTotalLength();
    
    MASTER_PATH.style.strokeWidth = (12 * scale) + "px";
    FILL_PATH.style.strokeWidth = (12 * scale) + "px";

    // BALANCED SCALING
    const iconSize = 44 * scale; 
    const btnSize = 38 * scale;
    
    PRAYERS.forEach(p => {
        const el = document.getElementById("icon-" + p);
        const pt = MASTER_PATH.getPointAtLength(NODES[p] * pathLen);
        el.style.width = iconSize + "px";
        el.style.height = iconSize + "px";
        el.style.left = (pt.x * scale + rect.left) + "px";
        el.style.top = (pt.y * scale + rect.top) + "px";
    });

    const btns = [document.getElementById('langBtn'), document.getElementById('refreshBtn')];
    btns[0].style.width = btnSize + "px"; btns[0].style.height = btnSize + "px";
    btns[0].style.left = (btnSize * 0.9) + "px"; btns[0].style.top = (btnSize * 0.9) + "px";
    
    btns[1].style.width = btnSize + "px"; btns[1].style.height = btnSize + "px";
    btns[1].style.right = (btnSize * -0.1) + "px"; btns[1].style.top = (btnSize * 0.9) + "px";

    // BALANCED TEXT SIZES
    document.getElementById("p-name").style.fontSize = (1.4 * scale) + "rem";
    document.getElementById("p-time").style.fontSize = (3.4 * scale) + "rem";
    document.getElementById("p-city").style.fontSize = (0.95 * scale) + "rem";
    document.getElementById("info").style.top = (rect.top + rect.height * 0.6) + "px";

    updateLiveProgress(pathLen, scale, rect);
}

function updateLiveProgress(pathLen, scale, rect) {
    if (!state.timings) return;
    const now = new Date();
    const minsNow = now.getHours() * 60 + now.getMinutes();

    let next = "fajr", prev = "isha";
    for(let i=0; i<PRAYERS.length; i++) {
        const pm = toMin(state.timings[PRAYERS[i].charAt(0).toUpperCase() + PRAYERS[i].slice(1)]);
        if (pm > minsNow) {
            next = PRAYERS[i];
            prev = PRAYERS[i-1] || "isha";
            break;
        }
    }

    const tStart = toMin(state.timings[prev.charAt(0).toUpperCase() + prev.slice(1)]);
    let tEnd = toMin(state.timings[next.charAt(0).toUpperCase() + next.slice(1)]);
    if (tEnd < tStart) tEnd += 1440;

    const progress = Math.max(0, Math.min(1, (minsNow - tStart) / (tEnd - tStart)));
    const totalPerc = NODES[prev] + (progress * (NODES[next] - NODES[prev]));

    const bead = document.getElementById("bead");
    const pt = MASTER_PATH.getPointAtLength(totalPerc * pathLen);
    bead.style.width = (14 * scale) + "px";
    bead.style.height = (14 * scale) + "px";
    bead.style.left = (pt.x * scale + rect.left) + "px";
    bead.style.top = (pt.y * scale + rect.top) + "px";

    FILL_PATH.style.strokeDasharray = pathLen;
    FILL_PATH.style.strokeDashoffset = pathLen * (1 - totalPerc);

    document.getElementById("p-time").innerText = state.timings[next.charAt(0).toUpperCase() + next.slice(1)];
    document.getElementById("p-name").innerText = TRANSLATIONS[state.lang][next];
    document.getElementById("widget").className = `arc-widget bg-${next}`;
    
    document.querySelectorAll('.prayer-icon').forEach(el => el.classList.remove('current'));
    const currentIcon = document.getElementById("icon-" + next);
    currentIcon.classList.add('current');
}

function toMin(t) { const [h, m] = t.split(":").map(Number); return h * 60 + m; }

async function fetchData() {
    const res = await fetch("https://api.aladhan.com/v1/timingsByCity?city=Ain%20Oussera&country=Algeria&method=19");
    const data = await res.json();
    state.timings = data.data.timings;
    updateLayout();
}

function toggleLang() {
    state.lang = state.lang === 'en' ? 'ar' : 'en';
    document.getElementById("p-city").innerText = TRANSLATIONS[state.lang].city;
    updateLayout();
}

window.onload = fetchData;
setInterval(updateLayout, 1000);
new ResizeObserver(updateLayout).observe(document.body);
</script>

</body>
</html>
