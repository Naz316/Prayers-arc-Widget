<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Arc · Notion Ready</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: transparent;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: auto;
        font-family: 'Roboto', sans-serif;
        padding: 8px;
    }
    [lang="ar"] { font-family: 'Cairo', sans-serif; }

    /* Widget container: flexible width, max width for Notion embed */
    .arc-widget {
        width: 100%;
        max-width: 540px;        /* comfortable size for Notion */
        margin: 0 auto;
        aspect-ratio: 380 / 240;  /* keeps shape */
        border-radius: 26px;
        overflow: hidden;
        position: relative;
        background: linear-gradient(180deg, #6f8cff, #3f4edb);
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        transition: background 1s ease;
    }

    .bg-fajr { background: linear-gradient(180deg, #141e30 0%, #243b55 100%); }
    .bg-sunrise { background: linear-gradient(180deg, #3a7bd5 0%, #00d2ff 100%); }
    .bg-dhuhr { background: linear-gradient(180deg, #4A90E2 0%, #3478c9 100%); }
    .bg-asr { background: linear-gradient(180deg, #517fa4 0%, #243949 100%); }
    .bg-maghrib { background: linear-gradient(180deg, #e65245 0%, #b33939 100%); }
    .bg-isha { background: linear-gradient(180deg, #0f0c29 0%, #302b63 100%); }

    .arc-svg {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 1;
    }
    .track { stroke: rgba(255,255,255,0.2); stroke-width: 10; fill: none; stroke-linecap: round; }
    .progress { stroke: white; stroke-width: 10; fill: none; stroke-linecap: round; filter: drop-shadow(0 0 6px rgba(255,255,255,0.8)); transition: stroke-dashoffset 0.5s ease; }

    .center-info {
        position: absolute;
        top: 55%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: white;
        z-index: 2;
        width: 90%;
        pointer-events: none;
    }
    .prayer-name { font-size: clamp(1rem, 4vw, 1.3rem); font-weight: 500; }
    .prayer-time { font-size: clamp(1.6rem, 6vw, 2.2rem); font-weight: bold; line-height: 1.1; }
    .city-name {
        font-size: clamp(0.7rem, 2.5vw, 0.9rem);
        opacity: 0.8;
        margin-top: 4px;
        pointer-events: auto;
        cursor: pointer;
        text-decoration: underline;
        display: inline-block;
    }

    .prayer-icon {
        position: absolute;
        width: 11%;
        aspect-ratio: 1/1;
        border-radius: 50%;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        transform: translate(-50%, -50%);
        z-index: 15;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        border: 1px solid rgba(255,255,255,0.5);
    }
    .prayer-icon img { width: 60%; object-fit: contain; }
    .prayer-icon.current {
        background: gold;
        width: 13%;
        box-shadow: 0 0 15px gold;
        border: 2px solid white;
    }

    .top-left, .top-right {
        position: absolute;
        z-index: 20;
        top: 5%;
        width: 11%;
        aspect-ratio: 1/1;
        border-radius: 50%;
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.2s;
    }
    .top-left { left: 4%; }
    .top-right { right: 4%; }
    .top-left img, .top-right img { width: 50%; filter: invert(1); }
    .top-left:hover, .top-right:hover { background: rgba(0,0,0,0.7); transform: scale(1.02); }
</style>
</head>
<body>
<div class="arc-widget" id="widget">

    <div class="top-left" onclick="toggleLang()" id="langBtn">
        <img src="https://cdn-icons-png.flaticon.com/128/18882/18882472.png">
    </div>
    <div class="top-right" onclick="window.location.reload()">
        <img src="https://cdn-icons-png.flaticon.com/128/9311/9311549.png">
    </div>

    <svg class="arc-svg" viewBox="0 0 380 240" id="svgBox">
        <path id="arcTrack" class="track" d="M 30 170 L 90 170 A 100 100 0 0 1 290 170 L 350 170"/>
        <path id="arcProgress" class="progress" d="M 30 170 L 90 170 A 100 100 0 0 1 290 170 L 350 170"/>
    </svg>

    <div class="prayer-icon" id="icon-fajr"><img src="https://cdn-icons-png.flaticon.com/128/4067/4067304.png"></div>
    <div class="prayer-icon" id="icon-sunrise"><img src="https://cdn-icons-png.flaticon.com/128/11546/11546454.png"></div>
    <div class="prayer-icon" id="icon-dhuhr"><img src="https://cdn-icons-png.flaticon.com/128/1004/1004519.png"></div>
    <div class="prayer-icon" id="icon-asr"><img src="https://cdn-icons-png.flaticon.com/128/3313/3313911.png"></div>
    <div class="prayer-icon" id="icon-maghrib"><img src="https://cdn-icons-png.flaticon.com/128/8840/8840934.png"></div>
    <div class="prayer-icon" id="icon-isha"><img src="https://cdn-icons-png.flaticon.com/128/2116/2116201.png"></div>

    <div class="center-info">
        <div class="prayer-name" id="prayer-name">--</div>
        <div class="prayer-time" id="prayer-time">--:--</div>
        <div class="city-name" id="city-display">Ain Oussera</div>
    </div>
</div>

<script>
const PRAYERS = ["Fajr", "Sunrise", "Dhuhr", "Asr", "Maghrib", "Isha"];
const NODES = { "Fajr": 0, "Sunrise": 0.15, "Dhuhr": 0.50, "Asr": 0.72, "Maghrib": 0.85, "Isha": 1 };
const TRANSLATIONS = {
    en: { Fajr: "Fajr", Sunrise: "Sunrise", Dhuhr: "Dhuhr", Asr: "Asr", Maghrib: "Maghrib", Isha: "Isha", city: "Ain Oussera" },
    ar: { Fajr: "الفجر", Sunrise: "الشروق", Dhuhr: "الظهر", Asr: "العصر", Maghrib: "المغرب", Isha: "العشاء", city: "عين وسارة" }
};

const PATH = document.getElementById("arcProgress");
let state = { timings: null, lang: 'en' };

// Position icons exactly on the arc (scaled with container)
function snapIconsToPath() {
    const pathLen = PATH.getTotalLength();
    const svgRect = document.getElementById('svgBox').getBoundingClientRect();
    const scaleX = svgRect.width / 380;
    const scaleY = svgRect.height / 240;

    PRAYERS.forEach(p => {
        const perc = NODES[p];
        const pt = PATH.getPointAtLength(perc * pathLen);
        const el = document.getElementById("icon-" + p.toLowerCase());
        if (el) {
            el.style.left = (pt.x * scaleX) + "px";
            el.style.top = (pt.y * scaleY) + "px";
        }
    });
}

async function fetchData() {
    try {
        const res = await fetch("https://api.aladhan.com/v1/timingsByCity?city=Ain%20Oussera&country=Algeria&method=19");
        const data = await res.json();
        if (data.code === 200) {
            state.timings = data.data.timings;
            updateWidget();
        } else {
            console.warn("API error");
        }
    } catch (e) { console.error("Fetch failed", e); }
}

function updateWidget() {
    if (!state.timings) return;
    const now = new Date();
    const minsNow = now.getHours() * 60 + now.getMinutes();

    let next = "Fajr", prev = "Isha";
    let isPastIsha = true;
    for(let i=0; i<PRAYERS.length; i++) {
        const pm = toMin(state.timings[PRAYERS[i]]);
        if (pm > minsNow) {
            next = PRAYERS[i];
            prev = PRAYERS[i-1] || "Isha";
            isPastIsha = false;
            break;
        }
    }

    document.getElementById("prayer-time").innerText = state.timings[next];
    document.getElementById("prayer-name").innerText = TRANSLATIONS[state.lang][next];
    document.getElementById("widget").className = `arc-widget bg-${next.toLowerCase()}`;
    
    document.querySelectorAll('.prayer-icon').forEach(el => el.classList.remove('current'));
    const activeIcon = document.getElementById("icon-" + next.toLowerCase());
    if (activeIcon) activeIcon.classList.add('current');

    let totalPerc;
    if (isPastIsha) totalPerc = 1;
    else if (minsNow < toMin(state.timings["Fajr"])) totalPerc = 0;
    else {
        const tStart = toMin(state.timings[prev]);
        const tEnd = toMin(state.timings[next]);
        const progress = Math.max(0, Math.min(1, (minsNow - tStart) / (tEnd - tStart)));
        totalPerc = NODES[prev] + (progress * (NODES[next] - NODES[prev]));
    }

    const pathLen = PATH.getTotalLength();
    PATH.style.strokeDasharray = pathLen;
    PATH.style.strokeDashoffset = pathLen * (1 - totalPerc);
}

function toMin(t) { const [h, m] = t.split(":").map(Number); return h*60 + m; }

function toggleLang() {
    state.lang = state.lang === 'en' ? 'ar' : 'en';
    document.getElementById("city-display").innerText = TRANSLATIONS[state.lang].city;
    updateWidget();
}

// Initial run
fetchData();
setInterval(updateWidget, 1000);

// Re‑snap icons when widget resizes (critical for Notion embed)
const resizeObserver = new ResizeObserver(() => { snapIconsToPath(); });
resizeObserver.observe(document.getElementById('widget'));
</script>
</body>
</html>
