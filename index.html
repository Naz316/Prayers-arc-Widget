<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixed Prayer Arc</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #c0c0c0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: 'Roboto', sans-serif;
    }

    [lang="ar"] { font-family: 'Cairo', sans-serif; }

    .arc-widget {
        width: 380px;
        height: 240px;
        border-radius: 26px;
        overflow: hidden;
        position: relative;
        background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        transition: background 1s ease;
    }

    /* Dynamic Gradients */
    .bg-fajr { background: linear-gradient(180deg, #141e30 0%, #243b55 100%); }
    .bg-sunrise { background: linear-gradient(180deg, #3a7bd5 0%, #00d2ff 100%); }
    .bg-dhuhr { background: linear-gradient(180deg, #4A90E2 0%, #3478c9 100%); }
    .bg-asr { background: linear-gradient(180deg, #517fa4 0%, #243949 100%); }
    .bg-maghrib { background: linear-gradient(180deg, #e65245 0%, #b33939 100%); }
    .bg-isha { background: linear-gradient(180deg, #0f0c29 0%, #302b63 100%); }

    /* SVG */
    .arc-svg {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 1;
    }

    .track {
        stroke: rgba(255, 255, 255, 0.2);
        stroke-width: 10;
        fill: none;
        stroke-linecap: round;
    }

    .progress {
        stroke: white;
        stroke-width: 10;
        fill: none;
        stroke-linecap: round;
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
        transition: stroke-dashoffset 0.5s ease;
    }

    /* Center Info */
    .center-info {
        position: absolute;
        top: 55%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: white;
        z-index: 2;
    }

    .prayer-name { font-size: 1.4rem; font-weight: 500; }
    .prayer-time { font-size: 2.4rem; font-weight: bold; line-height: 1.1; }
    .city-name { font-size: 0.9rem; opacity: 0.8; margin-top: 5px; }

    /* Icons */
    .prayer-icon {
        position: absolute;
        width: 34px; height: 34px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        transform: translate(-50%, -50%);
        color: white;
        z-index: 10;
        transition: all 0.4s ease;
    }

    .prayer-icon img { width: 18px; filter: invert(1); }

    .prayer-icon.current {
        background: white;
        width: 42px; height: 42px;
        box-shadow: 0 0 15px white;
        border: none;
    }
    .prayer-icon.current img { filter: invert(0.3); width: 22px; }

    /* Side Buttons */
    .side {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        gap: 12px;
        z-index: 20;
    }

    .btn {
        width: 36px; height: 36px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        cursor: pointer;
        transition: 0.2s;
    }
    .btn:hover { background: rgba(255, 255, 255, 0.4); }
</style>
</head>

<body>

<div class="arc-widget" id="widget">

<svg class="arc-svg" viewBox="0 0 380 240">
    <!-- MASTER PATH __⌒__ -->
    <path id="arcTrack" class="track" d="M 30 170 L 90 170 A 100 100 0 0 1 290 170 L 350 170"/>
    <path id="arcProgress" class="progress" d="M 30 170 L 90 170 A 100 100 0 0 1 290 170 L 350 170"/>
</svg>

<!-- icons (JS positions these perfectly) -->
<div class="prayer-icon" id="icon-fajr"><img src="https://cdn-icons-png.flaticon.com/128/4067/4067304.png"></div>
<div class="prayer-icon" id="icon-sunrise"><img src="https://cdn-icons-png.flaticon.com/128/6821/6821113.png"></div>
<div class="prayer-icon" id="icon-dhuhr"><img src="https://www.svgrepo.com/show/341098/sunny.svg"></div>
<div class="prayer-icon" id="icon-asr"><img src="https://cdn-icons-png.flaticon.com/128/1163/1163624.png"></div>
<div class="prayer-icon" id="icon-maghrib"><img src="https://cdn-icons-png.flaticon.com/128/8840/8840934.png"></div>
<div class="prayer-icon" id="icon-isha"><img src="https://cdn-icons-png.flaticon.com/128/2116/2116201.png"></div>

<div class="center-info">
    <div class="prayer-name" id="prayer-name">Next Prayer</div>
    <div class="prayer-time" id="prayer-time">--:--</div>
    <div class="city-name" id="city-display">Ain Oussera</div>
</div>

<div class="side">
    <div class="btn" onclick="fetchData()">↻</div>
    <div class="btn" onclick="toggleLang()">文</div>
</div>

</div>

<script>
const PRAYERS = ["Fajr", "Sunrise", "Dhuhr", "Asr", "Maghrib", "Isha"];
// Map percentage points along the line __⌒__
const NODES = { "Fajr": 0, "Sunrise": 0.15, "Dhuhr": 0.50, "Asr": 0.72, "Maghrib": 0.85, "Isha": 1 };

const PATH = document.getElementById("arcProgress");
const PATH_LEN = PATH.getTotalLength();
let state = { timings: null, lang: 'en' };

// 1. POSITION ICONS AUTOMATICALLY ON THE LINE
function snapIconsToPath() {
    PRAYERS.forEach(p => {
        const perc = NODES[p];
        const pt = PATH.getPointAtLength(perc * PATH_LEN);
        const el = document.getElementById("icon-" + p.toLowerCase());
        el.style.left = pt.x + "px";
        el.style.top = pt.y + "px";
    });
}

// 2. FETCH DATA
async function fetchData() {
    try {
        const res = await fetch("https://api.aladhan.com/v1/timingsByCity?city=Ain%20Oussera&country=Algeria&method=19");
        const data = await res.json();
        state.timings = data.data.timings;
        updateWidget();
    } catch (e) { console.error("Fetch failed", e); }
}

// 3. UPDATE LOGIC
function updateWidget() {
    if (!state.timings) return;
    const now = new Date();
    const minsNow = now.getHours() * 60 + now.getMinutes();

    let next = "Fajr", prev = "Isha";
    for(let i=0; i<PRAYERS.length; i++) {
        const pm = toMin(state.timings[PRAYERS[i]]);
        if (pm > minsNow) {
            next = PRAYERS[i];
            prev = PRAYERS[i-1] || "Isha";
            break;
        }
    }

    // UI Updates
    document.getElementById("prayer-time").innerText = state.timings[next];
    document.getElementById("prayer-name").innerText = next;
    document.getElementById("widget").className = `arc-widget bg-${next.toLowerCase()}`;
    
    document.querySelectorAll('.prayer-icon').forEach(el => el.classList.remove('current'));
    document.getElementById("icon-" + next.toLowerCase()).classList.add('current');

    // Progress Calculation
    const startPerc = NODES[prev];
    const endPerc = NODES[next];
    const tStart = toMin(state.timings[prev]);
    let tEnd = toMin(state.timings[next]);
    if (tEnd < tStart) tEnd += 1440; // overnight check

    const progress = Math.max(0, Math.min(1, (minsNow - tStart) / (tEnd - tStart)));
    const totalPerc = startPerc + (progress * (endPerc - startPerc));

    PATH.style.strokeDasharray = PATH_LEN;
    PATH.style.strokeDashoffset = PATH_LEN * (1 - totalPerc);
}

function toMin(t) {
    const [h, m] = t.split(":").map(Number);
    return h * 60 + m;
}

function toggleLang() {
    state.lang = state.lang === 'en' ? 'ar' : 'en';
    document.getElementById("city-display").innerText = state.lang === 'ar' ? "عين وسارة" : "Ain Oussera";
}

// Start
snapIconsToPath();
fetchData();
setInterval(updateWidget, 1000); // Update every second for smoothness
</script>

</body>
</html>
