<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Arc · Full Screen View</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #141e30;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        width: 100vw;
        font-family: 'Roboto', sans-serif;
        overflow: hidden; /* Prevents scrollbars */
    }

    [lang="ar"] { font-family: 'Cairo', sans-serif; }

    .arc-widget {
        width: 100vw;   /* Covers full width */
        height: 100vh;  /* Covers full height */
        position: relative;
        background: linear-gradient(180deg, #6f8cff, #3f4edb);
        transition: background 1s ease;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Dynamic Gradients */
    .bg-fajr { background: linear-gradient(180deg, #141e30 0%, #243b55 100%); }
    .bg-sunrise { background: linear-gradient(180deg, #3a7bd5 0%, #00d2ff 100%); }
    .bg-dhuhr { background: linear-gradient(180deg, #4A90E2 0%, #3478c9 100%); }
    .bg-asr { background: linear-gradient(180deg, #517fa4 0%, #243949 100%); }
    .bg-maghrib { background: linear-gradient(180deg, #e65245 0%, #b33939 100%); }
    .bg-isha { background: linear-gradient(180deg, #0f0c29 0%, #302b63 100%); }

    /* SVG - Scaled to screen */
    .arc-svg {
        position: absolute;
        width: 100%;
        height: 100%;
        max-width: 1000px; /* Keeps the arc from becoming too wide on big screens */
        max-height: 600px;
        z-index: 1;
    }

    .track {
        stroke: rgba(255, 255, 255, 0.2);
        stroke-width: 10;
        fill: none;
        stroke-linecap: round;
    }

    .progress {
        stroke: white;
        stroke-width: 10;
        fill: none;
        stroke-linecap: round;
        filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.8));
        transition: stroke-dashoffset 0.5s ease;
    }

    /* Center Info - Scaled up for big screen */
    .center-info {
        position: absolute;
        text-align: center;
        color: white;
        z-index: 2;
        margin-top: 5vh;
    }

    .prayer-name { font-size: 2rem; font-weight: 500; margin-bottom: 10px; }
    .prayer-time { font-size: 5rem; font-weight: bold; line-height: 1; }
    .city-name { font-size: 1.5rem; opacity: 0.8; margin-top: 15px; }

    /* Icons - Larger for full screen */
    .prayer-icon {
        position: absolute;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        transform: translate(-50%, -50%);
        z-index: 15;
        transition: all 0.2s ease;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .prayer-icon img { width: 34px; }

    .prayer-icon.current {
        background: gold;
        width: 80px;
        height: 80px;
        box-shadow: 0 0 30px gold;
        border: 4px solid white;
    }
    .prayer-icon.current img { width: 45px; }

    /* Top buttons - Placed at screen corners */
    .top-left, .top-right {
        position: absolute;
        z-index: 20;
        top: 30px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: rgba(0,0,0,0.4);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.3s;
    }
    .top-left { left: 30px; }
    .top-right { right: 30px; }
    .top-left:hover, .top-right:hover { background: rgba(0,0,0,0.7); transform: scale(1.1); }

    .top-left img, .top-right img {
        width: 30px;
        height: 30px;
        filter: invert(1);
    }
</style>
</head>

<body>

<div class="arc-widget" id="widget">

    <!-- Language Button -->
    <div class="top-left" onclick="toggleLang()" id="langBtn">
        <img src="https://cdn-icons-png.flaticon.com/128/18882/18882472.png" alt="lang">
    </div>

    <!-- REFRESH BUTTON: Now reloads the full page -->
    <div class="top-right" onclick="window.location.reload()">
        <img src="https://cdn-icons-png.flaticon.com/128/9311/9311549.png" alt="refresh">
    </div>

    <svg class="arc-svg" viewBox="0 0 380 240">
        <path id="arcTrack" class="track" d="M 30 170 L 90 170 A 100 100 0 0 1 290 170 L 350 170"/>
        <path id="arcProgress" class="progress" d="M 30 170 L 90 170 A 100 100 0 0 1 290 170 L 350 170"/>
    </svg>

    <!-- Icons -->
    <div class="prayer-icon" id="icon-fajr"><img src="https://cdn-icons-png.flaticon.com/128/4067/4067304.png"></div>
    <div class="prayer-icon" id="icon-sunrise"><img src="https://cdn-icons-png.flaticon.com/128/11546/11546454.png"></div>
    <div class="prayer-icon" id="icon-dhuhr"><img src="https://cdn-icons-png.flaticon.com/128/1004/1004519.png"></div>
    <div class="prayer-icon" id="icon-asr"><img src="https://cdn-icons-png.flaticon.com/128/3313/3313911.png"></div>
    <div class="prayer-icon" id="icon-maghrib"><img src="https://cdn-icons-png.flaticon.com/128/8840/8840934.png"></div>
    <div class="prayer-icon" id="icon-isha"><img src="https://cdn-icons-png.flaticon.com/128/2116/2116201.png"></div>

    <div class="center-info">
        <div class="prayer-name" id="prayer-name">--</div>
        <div class="prayer-time" id="prayer-time">--:--</div>
        <div class="city-name" id="city-display">Ain Oussera</div>
    </div>

</div>

<script>
const PRAYERS = ["Fajr", "Sunrise", "Dhuhr", "Asr", "Maghrib", "Isha"];
const NODES = { "Fajr": 0, "Sunrise": 0.15, "Dhuhr": 0.50, "Asr": 0.72, "Maghrib": 0.85, "Isha": 1 };
const TRANSLATIONS = {
    en: { Fajr: "Fajr", Sunrise: "Sunrise", Dhuhr: "Dhuhr", Asr: "Asr", Maghrib: "Maghrib", Isha: "Isha", city: "Ain Oussera" },
    ar: { Fajr: "الفجر", Sunrise: "الشروق", Dhuhr: "الظهر", Asr: "العصر", Maghrib: "المغرب", Isha: "العشاء", city: "عين وسارة" }
};

const PATH = document.getElementById("arcProgress");
let state = { timings: null, lang: 'en' };

// Fixed Snap Logic for Responsive Screen
function snapIconsToPath() {
    const pathLen = PATH.getTotalLength();
    const svgRect = document.querySelector('.arc-svg').getBoundingClientRect();
    const widgetRect = document.getElementById('widget').getBoundingClientRect();

    PRAYERS.forEach(p => {
        const perc = NODES[p];
        const pt = PATH.getPointAtLength(perc * pathLen);
        const el = document.getElementById("icon-" + p.toLowerCase());
        
        // Calculate position relative to full screen
        const scaleX = svgRect.width / 380;
        const scaleY = svgRect.height / 240;
        
        const offsetX = svgRect.left - widgetRect.left;
        const offsetY = svgRect.top - widgetRect.top;

        el.style.left = (pt.x * scaleX + offsetX) + "px";
        el.style.top = (pt.y * scaleY + offsetY) + "px";
    });
}

async function fetchData() {
    try {
        const res = await fetch("https://api.aladhan.com/v1/timingsByCity?city=Ain%20Oussera&country=Algeria&method=19");
        const data = await res.json();
        state.timings = data.data.timings;
        updateWidget();
    } catch (e) { console.error("Fetch failed", e); }
}

function updateWidget() {
    if (!state.timings) return;
    const now = new Date();
    const minsNow = now.getHours() * 60 + now.getMinutes();

    let next = "Fajr", prev = "Isha";
    for(let i=0; i<PRAYERS.length; i++) {
        const pm = toMin(state.timings[PRAYERS[i]]);
        if (pm > minsNow) {
            next = PRAYERS[i];
            prev = PRAYERS[i-1] || "Isha";
            break;
        }
    }

    document.getElementById("prayer-time").innerText = state.timings[next];
    document.getElementById("prayer-name").innerText = TRANSLATIONS[state.lang][next];
    document.getElementById("widget").className = `arc-widget bg-${next.toLowerCase()}`;
    
    document.querySelectorAll('.prayer-icon').forEach(el => el.classList.remove('current'));
    document.getElementById("icon-" + next.toLowerCase()).classList.add('current');

    const startPerc = NODES[prev];
    const endPerc = NODES[next];
    const tStart = toMin(state.timings[prev]);
    let tEnd = toMin(state.timings[next]);
    if (tEnd < tStart) tEnd += 1440;

    const progress = Math.max(0, Math.min(1, (minsNow - tStart) / (tEnd - tStart)));
    const totalPerc = startPerc + (progress * (endPerc - startPerc));

    const pathLen = PATH.getTotalLength();
    PATH.style.strokeDasharray = pathLen;
    PATH.style.strokeDashoffset = pathLen * (1 - totalPerc);
}

function toMin(t) {
    const [h, m] = t.split(":").map(Number);
    return h * 60 + m;
}

function toggleLang() {
    state.lang = state.lang === 'en' ? 'ar' : 'en';
    document.documentElement.lang = state.lang;
    document.getElementById("city-display").innerText = TRANSLATIONS[state.lang].city;
    updateWidget();
}

// Initial Run
fetchData();
setInterval(updateWidget, 1000);
window.addEventListener('resize', snapIconsToPath);
// Delay snapping slightly to ensure layout is ready
setTimeout(snapIconsToPath, 500);
</script>

</body>
</html>
