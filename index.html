<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Prayer Arc · With Duha</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        background: transparent !important;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Roboto', sans-serif;
    }
    [lang="ar"] { font-family: 'Cairo', sans-serif; }

    .arc-widget {
        width: 100% !important;
        max-width: 100% !important;
        aspect-ratio: 380 / 240;
        border-radius: 26px;
        overflow: visible;
        position: relative;
        background: linear-gradient(180deg, #6f8cff, #3f4edb);
        box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        transition: background 1s ease;
    }

    .arc-widget { overflow: visible; }
    .arc-svg { overflow: visible; }

    .bg-fajr { background: linear-gradient(180deg, #141e30 0%, #243b55 100%); }
    .bg-sunrise { background: linear-gradient(180deg, #3a7bd5 0%, #00d2ff 100%); }
    .bg-duha { background: linear-gradient(180deg, #f6d365 0%, #fda085 100%); }
    .bg-dhuhr { background: linear-gradient(180deg, #4A90E2 0%, #3478c9 100%); }
    .bg-asr { background: linear-gradient(180deg, #517fa4 0%, #243949 100%); }
    .bg-maghrib { background: linear-gradient(180deg, #e65245 0%, #b33939 100%); }
    .bg-isha { background: linear-gradient(180deg, #0f0c29 0%, #302b63 100%); }

    .arc-svg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
    }
    .track {
        stroke: rgba(255,255,255,0.2);
        stroke-width: 10;
        fill: none;
        stroke-linecap: round;
    }
    .progress {
        stroke: white;
        stroke-width: 10;
        fill: none;
        stroke-linecap: round;
        filter: drop-shadow(0 0 6px rgba(255,255,255,0.8));
        transition: stroke-dashoffset 0.5s ease;
    }

    .center-info {
        position: absolute;
        top: 55%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: white;
        z-index: 2;
        width: 90%;
        pointer-events: none;
    }
    .prayer-name { font-size: clamp(1rem, 4vw, 1.35rem); font-weight: 500; }
    .prayer-time { font-size: clamp(1.6rem, 6vw, 2.3rem); font-weight: bold; line-height: 1.1; }
    .city-name {
        font-size: clamp(0.7rem, 2.5vw, 0.9rem);
        opacity: 0.85;
        margin-top: 4px;
        pointer-events: auto;
        cursor: pointer;
        text-decoration: underline;
        display: inline-block;
    }
    .countdown {
        font-size: clamp(0.7rem, 2.5vw, 0.9rem);
        opacity: 0.9;
        margin-top: 2px;
        letter-spacing: 0.5px;
    }

    /* Icons – slightly smaller */
    .prayer-icon {
        position: absolute;
        width: 9%;
        aspect-ratio: 1/1;
        border-radius: 50%;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        transform: translate(-50%, -50%);
        z-index: 15;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        border: 1px solid rgba(255,255,255,0.5);
    }
    .prayer-icon img { width: 55%; object-fit: contain; }
    .prayer-icon.current {
        background: gold;
        width: 11%;
        box-shadow: 0 0 15px gold;
        border: 2px solid white;
    }

    .top-left, .top-right {
        position: absolute;
        z-index: 20;
        top: 5%;
        width: 10%;
        aspect-ratio: 1/1;
        border-radius: 50%;
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.3);
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        transition: 0.2s;
    }
    .top-left { left: 4%; }
    .top-right { right: 4%; }
    .top-left img, .top-right img { width: 50%; filter: invert(1); }

    .controls-panel {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        padding: 12px 16px;
        display: none;
        flex-direction: column;
        gap: 8px;
        border-top: 1px solid rgba(255,255,255,0.2);
        z-index: 30;
        border-radius: 20px 20px 0 0;
    }
    .controls-panel.show { display: flex; }
    .select-row { display: flex; gap: 10px; }
    .select-group { flex: 1; }
    .select-group label { font-size: 0.6rem; color: #ccc; margin-bottom: 3px; display: block; text-transform: uppercase; }
    select {
        width: 100%;
        background: rgba(0,0,0,0.6);
        border: 1px solid rgba(255,255,255,0.3);
        color: white;
        padding: 6px 8px;
        border-radius: 20px;
        font-size: 0.75rem;
        outline: none;
    }
    .action-buttons {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
    }
    .action-buttons button {
        background: rgba(255,255,255,0.15);
        border: 1px solid rgba(255,255,255,0.3);
        color: white;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.7rem;
        cursor: pointer;
    }
</style>
</head>
<body>
<div class="arc-widget" id="widget">
    <div class="top-left" id="langBtn">
        <img src="https://cdn-icons-png.flaticon.com/128/18882/18882472.png">
    </div>
    <div class="top-right" id="refreshBtn">
        <img src="https://cdn-icons-png.flaticon.com/128/9311/9311549.png">
    </div>

    <svg class="arc-svg" viewBox="0 0 380 240" id="svgBox">
        <!-- tracks -->
        <line x1="0" y1="170" x2="30" y2="170" class="track" />
        <path id="arcTrack" class="track" d="M 30 170 L 90 170 A 100 100 0 0 1 290 170 L 350 170" />
        <line x1="350" y1="170" x2="380" y2="170" class="track" />

        <!-- progress elements -->
        <line id="leftProgress" class="progress" x1="0" y1="170" x2="30" y2="170" stroke-dasharray="30" stroke-dashoffset="30" />
        <path id="arcProgress" class="progress" d="M 30 170 L 90 170 A 100 100 0 0 1 290 170 L 350 170" />
        <line id="rightProgress" class="progress" x1="350" y1="170" x2="380" y2="170" stroke-dasharray="30" stroke-dashoffset="30" />
    </svg>

    <!-- Prayer icons (including Duha) -->
    <div class="prayer-icon" id="icon-fajr"><img src="https://cdn-icons-png.flaticon.com/128/3093/3093380.png"></div>
    <div class="prayer-icon" id="icon-sunrise"><img src="https://cdn-icons-png.flaticon.com/128/11546/11546454.png"></div>
    <div class="prayer-icon" id="icon-duha"><img src="https://cdn-icons-png.flaticon.com/128/2445/2445821.png"></div>
    <div class="prayer-icon" id="icon-dhuhr"><img src="https://cdn-icons-png.flaticon.com/128/1004/1004519.png"></div>
    <div class="prayer-icon" id="icon-asr"><img src="https://cdn-icons-png.flaticon.com/128/3313/3313911.png"></div>
    <div class="prayer-icon" id="icon-maghrib"><img src="https://cdn-icons-png.flaticon.com/128/8840/8840934.png"></div>
    <div class="prayer-icon" id="icon-isha"><img src="https://cdn-icons-png.flaticon.com/128/606/606807.png"></div>

    <div class="center-info">
        <div class="prayer-name" id="prayer-name">--</div>
        <div class="prayer-time" id="prayer-time">--:--</div>
        <div class="city-name" id="city-display">Ain Oussera</div>
        <div class="countdown" id="countdownDisplay">--:--:--</div>
    </div>

    <div class="controls-panel" id="controlsPanel">
        <div class="select-row">
            <div class="select-group">
                <label id="cityLabel">City</label>
                <select id="citySelect" onchange="updateLocation()"></select>
            </div>
            <div class="select-group">
                <label id="countryLabel">Country</label>
                <select id="countrySelect" onchange="changeCountry()"></select>
            </div>
        </div>
        <div class="action-buttons">
            <button id="closeBtn">Close</button>
        </div>
    </div>
</div>

<script>
// ==================== UNIQUE ID ====================
const urlParams = new URLSearchParams(window.location.search);
const widgetId = urlParams.get('id') || 'default';

// ==================== PRAYER DATA (including Duha) ====================
const PRAYERS = ["Fajr", "Sunrise", "Duha", "Dhuhr", "Asr", "Maghrib", "Isha"];
// Arc fractions (0..1) for each prayer – Duha placed symmetrically opposite Asr
const NODES = {
    "Fajr": 0,
    "Sunrise": 0.15,
    "Duha": 0.28,    // mid‑morning, between Sunrise and Dhuhr
    "Dhuhr": 0.50,
    "Asr": 0.72,
    "Maghrib": 0.85,
    "Isha": 1
};
const TRANSLATIONS = {
    en: {
        Fajr: "Fajr", Sunrise: "Sunrise", Duha: "Duha", Dhuhr: "Dhuhr",
        Asr: "Asr", Maghrib: "Maghrib", Isha: "Isha",
        city: "Ain Oussera",
        cityLabel: "City",
        countryLabel: "Country",
        close: "Close",
        countdownLabel: "in"
    },
    ar: {
        Fajr: "الفجر", Sunrise: "الشروق", Duha: "الضحى", Dhuhr: "الظهر",
        Asr: "العصر", Maghrib: "المغرب", Isha: "العشاء",
        city: "عين وسارة",
        cityLabel: "المدينة",
        countryLabel: "الدولة",
        close: "إغلاق",
        countdownLabel: "متبقي"
    }
};

// ==================== COUNTRY & CITY DATA (unchanged) ====================
const COUNTRY_DATA = {
    "Algeria": ["Ain Oussera", "Algiers"],
    "Saudi Arabia": ["Makkah", "Madinah"],
    "Palestine": ["Gaza", "Jerusalem"],
    "Egypt": ["Cairo"],
    "Morocco": ["Rabat"],
    "Tunisia": ["Tunis"],
    "France": ["Paris"],
    "US": ["Washington"],
    "UK": ["London"],
    "Turkey": ["Ankara"],
    "Indonesia": ["Jakarta"],
    "Malaysia": ["Kuala Lumpur"]
};
const DICT_COUNTRIES = {
    "Algeria": "الجزائر", "Palestine": "فلسطين", "Saudi Arabia": "السعودية", "Egypt": "مصر",
    "Morocco": "المغرب", "Tunisia": "تونس", "France": "فرنسا", "US": "أمريكا",
    "UK": "بريطانيا", "Turkey": "تركيا", "Indonesia": "إندونيسيا", "Malaysia": "ماليزيا"
};
const DICT_CITIES = {
    "Ain Oussera": "عين وسارة", "Algiers": "الجزائر العاصمة", "Makkah": "مكة المكرمة", "Madinah": "المدينة المنورة",
    "Gaza": "غزة", "Jerusalem": "القدس", "Cairo": "القاهرة", "Rabat": "الرباط", "Tunis": "تونس العاصمة",
    "Paris": "باريس", "Washington": "واشنطن", "London": "لندن", "Ankara": "أنقرة", "Jakarta": "جاكرتا", "Kuala Lumpur": "كوالالمبور"
};

// ==================== STATE ====================
let state = {
    lang: localStorage.getItem(widgetId + '_lang') || 'en',
    city: localStorage.getItem(widgetId + '_city') || "Ain Oussera",
    country: localStorage.getItem(widgetId + '_country') || "Algeria",
    timings: null,
    timezone: null
};

const PATH = document.getElementById("arcProgress");
let PATH_LEN = null;
const LEFT_PROG = document.getElementById("leftProgress");
const RIGHT_PROG = document.getElementById("rightProgress");
const LEFT_LEN = 30;
const RIGHT_LEN = 30;

// ==================== HELPER FUNCTIONS ====================
function getKeyByValue(obj, val) {
    return Object.keys(obj).find(key => obj[key] === val);
}

function updateSelectTexts() {
    const countrySel = document.getElementById('countrySelect');
    for (let i = 0; i < countrySel.options.length; i++) {
        const eng = countrySel.options[i].value;
        countrySel.options[i].text = (state.lang === 'ar' && DICT_COUNTRIES[eng]) ? DICT_COUNTRIES[eng] : eng;
    }
    const citySel = document.getElementById('citySelect');
    for (let i = 0; i < citySel.options.length; i++) {
        const eng = citySel.options[i].value;
        citySel.options[i].text = (state.lang === 'ar' && DICT_CITIES[eng]) ? DICT_CITIES[eng] : eng;
    }
    document.getElementById('cityLabel').innerText = TRANSLATIONS[state.lang].cityLabel;
    document.getElementById('countryLabel').innerText = TRANSLATIONS[state.lang].countryLabel;
    document.getElementById('closeBtn').innerText = TRANSLATIONS[state.lang].close;
}

function populateCities() {
    const citySelect = document.getElementById('citySelect');
    citySelect.innerHTML = '';
    const cities = COUNTRY_DATA[state.country] || ["Capital"];
    cities.forEach(city => {
        const opt = document.createElement('option');
        opt.value = city;
        opt.text = city;
        citySelect.appendChild(opt);
    });
    citySelect.value = state.city;
    if (state.lang === 'ar') updateSelectTexts();
}

function updateLocationText() {
    let display = state.city;
    if (state.lang === 'ar') display = DICT_CITIES[display] || display;
    document.getElementById('city-display').innerText = display;
}

function snapIconsToPath() {
    if (!PATH_LEN) PATH_LEN = PATH.getTotalLength();
    const svgRect = document.getElementById('svgBox').getBoundingClientRect();
    const scaleX = svgRect.width / 380;
    const scaleY = svgRect.height / 240;
    PRAYERS.forEach(p => {
        const perc = NODES[p];
        const pt = PATH.getPointAtLength(perc * PATH_LEN);
        const el = document.getElementById("icon-" + p.toLowerCase());
        if (el) {
            el.style.left = (pt.x * scaleX) + "px";
            el.style.top = (pt.y * scaleY) + "px";
        }
    });
}

async function fetchData() {
    try {
        let engCity = state.city;
        let engCountry = state.country;
        const kCity = Object.keys(DICT_CITIES).find(key => DICT_CITIES[key] === state.city);
        if (kCity) engCity = kCity;
        const kCountry = Object.keys(DICT_COUNTRIES).find(key => DICT_COUNTRIES[key] === state.country);
        if (kCountry) engCountry = kCountry;
        const url = `https://api.aladhan.com/v1/timingsByCity?city=${engCity}&country=${engCountry}&method=19`;
        const res = await fetch(url);
        const data = await res.json();
        if (data.code === 200) {
            state.timings = data.data.timings;
            state.timezone = data.data.meta.timezone;
            // Calculate Duha time = Sunrise + 15 minutes
            const sunriseTime = state.timings.Sunrise;
            const [sh, sm] = sunriseTime.split(':').map(Number);
            let dh = sh, dm = sm + 15;
            if (dm >= 60) { dh += Math.floor(dm/60); dm = dm % 60; }
            state.timings.Duha = `${dh.toString().padStart(2,'0')}:${dm.toString().padStart(2,'0')}`;
            updateWidget();
        }
    } catch (e) { console.error("Fetch failed", e); }
}

function getCurrentTimeInZone() {
    const now = new Date();
    if (!state.timezone) return { h: now.getHours(), m: now.getMinutes(), s: now.getSeconds() };
    const formatter = new Intl.DateTimeFormat('en-GB', { timeZone: state.timezone, hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: false });
    const parts = formatter.formatToParts(now);
    const h = parseInt(parts.find(p => p.type === 'hour').value);
    const m = parseInt(parts.find(p => p.type === 'minute').value);
    const s = parseInt(parts.find(p => p.type === 'second').value);
    return { h, m, s };
}

function toMin(t) {
    if (!t) return 0;
    const [h, m] = t.split(":").map(Number);
    return h*60 + m;
}

function updateWidget() {
    if (!state.timings) return;
    const now = getCurrentTimeInZone();
    const minsNow = now.h*60 + now.m;

    // Determine next prayer (only for mandatory prayers: Fajr, Dhuhr, Asr, Maghrib, Isha)
    // Sunrise and Duha are not used for countdown.
    const mandatory = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
    let next = "Fajr", prev = "Isha";
    let isPastIsha = true;
    for (let i=0; i<mandatory.length; i++) {
        const pm = toMin(state.timings[mandatory[i]]);
        if (pm > minsNow) {
            next = mandatory[i];
            prev = mandatory[i-1] || "Isha";
            isPastIsha = false;
            break;
        }
    }

    // Update text and background
    document.getElementById("prayer-time").innerText = state.timings[next];
    document.getElementById("prayer-name").innerText = TRANSLATIONS[state.lang][next];
    document.getElementById("widget").className = `arc-widget bg-${next.toLowerCase()}`;

    // Icons highlighting – only highlight mandatory next prayer; optional Duha/Sunrise can stay grey when not current
    document.querySelectorAll('.prayer-icon').forEach(el => el.classList.remove('current'));
    const activeIcon = document.getElementById("icon-" + next.toLowerCase());
    if (activeIcon) activeIcon.classList.add('current');

    // ----- Central arc progress (based on mandatory prayers) -----
    let totalPerc;
    if (isPastIsha) totalPerc = 1;
    else if (minsNow < toMin(state.timings["Fajr"])) totalPerc = 0;
    else {
        const progress = Math.max(0, Math.min(1, (minsNow - toMin(state.timings[prev])) / (toMin(state.timings[next]) - toMin(state.timings[prev]))));
        totalPerc = NODES[prev] + (progress * (NODES[next] - NODES[prev]));
    }

    if (!PATH_LEN) PATH_LEN = PATH.getTotalLength();
    PATH.style.strokeDasharray = PATH_LEN;
    PATH.style.strokeDashoffset = PATH_LEN * (1 - totalPerc);

    // ----- Left line (before Fajr) -----
    const fajrMins = toMin(state.timings.Fajr);
    const isAfterFajr = (minsNow >= fajrMins) && (next !== "Fajr");
    LEFT_PROG.style.strokeDashoffset = isAfterFajr ? 0 : LEFT_LEN;

    // ----- Right line (after Isha) -----
    const ishaMins = toMin(state.timings.Isha);
    const isAfterIsha = (minsNow >= ishaMins) && (next === "Fajr");
    RIGHT_PROG.style.strokeDashoffset = isAfterIsha ? 0 : RIGHT_LEN;

    // ----- Countdown (to the next MANDATORY prayer) -----
    let nextTotalMinutes = toMin(state.timings[next]);
    let nextTotalSeconds = nextTotalMinutes * 60;
    let currentTotalSeconds = (now.h*3600) + (now.m*60) + now.s;
    if (isPastIsha) nextTotalSeconds += 24*3600;
    let diffSeconds = nextTotalSeconds - currentTotalSeconds;
    if (diffSeconds < 0) diffSeconds = 0;
    const hours = Math.floor(diffSeconds / 3600);
    const minutes = Math.floor((diffSeconds % 3600) / 60);
    const seconds = diffSeconds % 60;
    const timeString = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
    const countdownLabel = TRANSLATIONS[state.lang].countdownLabel;
    document.getElementById('countdownDisplay').innerText = `${countdownLabel} ${timeString}`;
}

// ==================== UI CONTROL FUNCTIONS (unchanged) ====================
function toggleControls() { document.getElementById('controlsPanel').classList.toggle('show'); }
function closeControls() { document.getElementById('controlsPanel').classList.remove('show'); }
function changeCountry() {
    const selected = document.getElementById('countrySelect').value;
    const engCountry = getKeyByValue(DICT_COUNTRIES, selected) || selected;
    state.country = engCountry;
    localStorage.setItem(widgetId + '_country', state.country);
    populateCities();
    const citySel = document.getElementById('citySelect');
    state.city = citySel.options[0].value;
    localStorage.setItem(widgetId + '_city', state.city);
    updateLocation();
}
function updateLocation() {
    state.city = document.getElementById('citySelect').value;
    localStorage.setItem(widgetId + '_city', state.city);
    updateLocationText();
    fetchData();
}
function toggleLang() {
    state.lang = state.lang === 'en' ? 'ar' : 'en';
    localStorage.setItem(widgetId + '_lang', state.lang);
    document.documentElement.lang = state.lang;
    updateSelectTexts();
    updateLocationText();
    updateWidget();
}
function fullRefresh() { window.location.reload(); }

// ==================== EVENT LISTENERS ====================
document.getElementById('langBtn').addEventListener('click', toggleLang);
document.getElementById('refreshBtn').addEventListener('click', fullRefresh);
document.getElementById('city-display').addEventListener('click', toggleControls);
document.getElementById('closeBtn').addEventListener('click', closeControls);

// ==================== INIT ====================
function init() {
    const savedLang = localStorage.getItem(widgetId + '_lang');
    if (savedLang) state.lang = savedLang;
    document.documentElement.lang = state.lang;
    const savedCity = localStorage.getItem(widgetId + '_city');
    if (savedCity) state.city = savedCity;
    const savedCountry = localStorage.getItem(widgetId + '_country');
    if (savedCountry) state.country = savedCountry;

    const countrySelect = document.getElementById('countrySelect');
    for (let c in COUNTRY_DATA) {
        const opt = document.createElement('option');
        opt.value = c;
        opt.text = c;
        countrySelect.appendChild(opt);
    }
    countrySelect.value = state.country;
    populateCities();
    document.getElementById('citySelect').value = state.city;
    updateSelectTexts();
    updateLocationText();

    PATH_LEN = PATH.getTotalLength();
    snapIconsToPath();
    fetchData();
    setInterval(updateWidget, 1000);
}

const resizeObserver = new ResizeObserver(() => {
    PATH_LEN = PATH.getTotalLength();
    snapIconsToPath();
});
resizeObserver.observe(document.getElementById('widget'));
window.addEventListener('load', init);
</script>
</body>
</html>
