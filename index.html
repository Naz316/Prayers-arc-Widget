<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Prayer Arc · Multi-Language · Larger</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: transparent;  /* removed grey background */
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: 'Roboto', sans-serif;
        padding: 16px;
    }

    [lang="ar"] { font-family: 'Cairo', sans-serif; }

    .arc-widget {
        width: 480px;           /* bigger widget */
        height: 300px;          /* bigger widget */
        border-radius: 32px;
        overflow: hidden;
        position: relative;
        background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        transition: background 1s ease;
    }

    /* Dynamic Gradients */
    .bg-fajr { background: linear-gradient(180deg, #141e30 0%, #243b55 100%); }
    .bg-sunrise { background: linear-gradient(180deg, #3a7bd5 0%, #00d2ff 100%); }
    .bg-dhuhr { background: linear-gradient(180deg, #4A90E2 0%, #3478c9 100%); }
    .bg-asr { background: linear-gradient(180deg, #517fa4 0%, #243949 100%); }
    .bg-maghrib { background: linear-gradient(180deg, #e65245 0%, #b33939 100%); }
    .bg-isha { background: linear-gradient(180deg, #0f0c29 0%, #302b63 100%); }

    .arc-svg {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 1;
    }

    .track {
        stroke: rgba(255, 255, 255, 0.2);
        stroke-width: 12;
        fill: none;
        stroke-linecap: round;
    }

    .progress {
        stroke: white;
        stroke-width: 12;
        fill: none;
        stroke-linecap: round;
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
        transition: stroke-dashoffset 0.5s ease;
    }

    .center-info {
        position: absolute;
        top: 55%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: white;
        z-index: 2;
        width: 90%;
        white-space: nowrap;
    }

    .prayer-name { font-size: 1.3rem; font-weight: 500; }
    .prayer-time { font-size: 2.2rem; font-weight: bold; line-height: 1.1; }
    .city-name { font-size: 0.85rem; opacity: 0.8; margin-top: 5px; cursor: pointer; display: inline-block; }

    .prayer-icon {
        position: absolute;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        transform: translate(-50%, -50%);
        color: #333;
        z-index: 15;
        transition: all 0.2s ease;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        border: 1px solid rgba(255,255,255,0.5);
    }

    .prayer-icon img {
        width: 24px;
        filter: none;
    }

    .prayer-icon.current {
        background: gold;
        width: 50px;
        height: 50px;
        box-shadow: 0 0 15px gold;
        border: 2px solid white;
    }
    .prayer-icon.current img { width: 28px; filter: none; }

    /* Top buttons */
    .top-left, .top-right {
        position: absolute;
        z-index: 20;
        top: 16px;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.2s;
    }
    .top-left { left: 16px; }
    .top-right { right: 16px; }
    .top-left:hover, .top-right:hover { background: rgba(0,0,0,0.7); transform: scale(1.05); }

    .top-left img, .top-right img {
        width: 24px;
        height: 24px;
        filter: invert(1);
    }

    /* Rotation animation for refresh */
    .rotate {
        animation: spin 0.6s ease-in-out;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    @media (max-width: 540px) {
        .arc-widget {
            width: 400px;
            height: 260px;
        }
        .prayer-name { font-size: 1rem; }
        .prayer-time { font-size: 1.8rem; }
        .prayer-icon { width: 36px; height: 36px; }
        .prayer-icon img { width: 20px; }
        .prayer-icon.current { width: 44px; height: 44px; }
        .prayer-icon.current img { width: 24px; }
    }
</style>
</head>

<body>

<div class="arc-widget" id="widget">

    <div class="top-left" onclick="toggleLang()" id="langBtn">
        <img src="https://cdn-icons-png.flaticon.com/128/18882/18882472.png">
    </div>
    <div class="top-right" id="refreshBtn" onclick="handleRefresh()">
        <img src="https://cdn-icons-png.flaticon.com/128/9311/9311549.png">
    </div>

    <svg class="arc-svg" viewBox="0 0 480 300">
        <!-- recalculated path for larger canvas: left line, arc, right line -->
        <path id="arcTrack" class="track" d="M 40 210 L 100 210 A 140 140 0 0 1 380 210 L 440 210"/>
        <path id="arcProgress" class="progress" d="M 40 210 L 100 210 A 140 140 0 0 1 380 210 L 440 210"/>
    </svg>

    <div class="prayer-icon" id="icon-fajr"><img src="https://cdn-icons-png.flaticon.com/128/4067/4067304.png"></div>
    <div class="prayer-icon" id="icon-sunrise"><img src="https://cdn-icons-png.flaticon.com/128/11546/11546454.png"></div>
    <div class="prayer-icon" id="icon-dhuhr"><img src="https://cdn-icons-png.flaticon.com/128/1004/1004519.png"></div>
    <div class="prayer-icon" id="icon-asr"><img src="https://cdn-icons-png.flaticon.com/128/3313/3313911.png"></div>
    <div class="prayer-icon" id="icon-maghrib"><img src="https://cdn-icons-png.flaticon.com/128/8840/8840934.png"></div>
    <div class="prayer-icon" id="icon-isha"><img src="https://cdn-icons-png.flaticon.com/128/2116/2116201.png"></div>

    <div class="center-info">
        <div class="prayer-name" id="prayer-name">--</div>
        <div class="prayer-time" id="prayer-time">--:--</div>
        <div class="city-name" id="city-display" onclick="toggleControls()">Ain Oussera</div>
    </div>

</div>

<script>
const PRAYERS = ["Fajr", "Sunrise", "Dhuhr", "Asr", "Maghrib", "Isha"];
// Updated NODES for new path (from 0 to 1)
// Path: left vertical (40->100) length 60, arc (r=140) length ~440, right vertical (380->440) length 60. Total ~560.
// We can still use fractions based on visual positions.
const NODES = { "Fajr": 0, "Sunrise": 0.15, "Dhuhr": 0.50, "Asr": 0.70, "Maghrib": 0.85, "Isha": 1 };
const TRANSLATIONS = {
    en: { Fajr: "Fajr", Sunrise: "Sunrise", Dhuhr: "Dhuhr", Asr: "Asr", Maghrib: "Maghrib", Isha: "Isha", city: "Ain Oussera" },
    ar: { Fajr: "الفجر", Sunrise: "الشروق", Dhuhr: "الظهر", Asr: "العصر", Maghrib: "المغرب", Isha: "العشاء", city: "عين وسارة" }
};

const PATH = document.getElementById("arcProgress");
let PATH_LEN = null;
let state = { timings: null, lang: 'en' };

// Function to update path length after resize or init
function updatePathLength() {
    PATH_LEN = PATH.getTotalLength();
    return PATH_LEN;
}

function snapIconsToPath() {
    if (!PATH_LEN) updatePathLength();
    PRAYERS.forEach(p => {
        const perc = NODES[p];
        const pt = PATH.getPointAtLength(perc * PATH_LEN);
        const el = document.getElementById("icon-" + p.toLowerCase());
        if (el) {
            el.style.left = pt.x + "px";
            el.style.top = pt.y + "px";
        }
    });
}

async function fetchData() {
    try {
        const res = await fetch("https://api.aladhan.com/v1/timingsByCity?city=Ain%20Oussera&country=Algeria&method=19");
        const data = await res.json();
        if (data.code === 200) {
            state.timings = data.data.timings;
            updateWidget();
        } else {
            console.warn("API error");
        }
    } catch (e) { console.error("Fetch failed", e); }
}

function updateWidget() {
    if (!state.timings) return;
    const now = new Date();
    const minsNow = now.getHours() * 60 + now.getMinutes();

    let next = "Fajr", prev = "Isha";
    for(let i=0; i<PRAYERS.length; i++) {
        const pm = toMin(state.timings[PRAYERS[i]]);
        if (pm > minsNow) {
            next = PRAYERS[i];
            prev = PRAYERS[i-1] || "Isha";
            break;
        }
    }

    document.getElementById("prayer-time").innerText = state.timings[next];
    document.getElementById("prayer-name").innerText = TRANSLATIONS[state.lang][next];
    document.getElementById("widget").className = `arc-widget bg-${next.toLowerCase()}`;
    
    document.querySelectorAll('.prayer-icon').forEach(el => el.classList.remove('current'));
    const currentIcon = document.getElementById("icon-" + next.toLowerCase());
    if (currentIcon) currentIcon.classList.add('current');

    const startPerc = NODES[prev];
    const endPerc = NODES[next];
    const tStart = toMin(state.timings[prev]);
    let tEnd = toMin(state.timings[next]);
    if (tEnd < tStart) tEnd += 1440;

    const progress = Math.max(0, Math.min(1, (minsNow - tStart) / (tEnd - tStart)));
    const totalPerc = startPerc + (progress * (endPerc - startPerc));

    if (PATH_LEN) {
        PATH.style.strokeDasharray = PATH_LEN;
        PATH.style.strokeDashoffset = PATH_LEN * (1 - totalPerc);
    }
}

function toMin(t) {
    const [h, m] = t.split(":").map(Number);
    return h * 60 + m;
}

function toggleLang() {
    state.lang = state.lang === 'en' ? 'ar' : 'en';
    document.documentElement.lang = state.lang;
    document.getElementById("city-display").innerText = TRANSLATIONS[state.lang].city;
    updateWidget(); // Refresh displayed prayer names
}

// Refresh button with rotation animation and data reload
async function handleRefresh() {
    const btn = document.getElementById("refreshBtn");
    btn.classList.add("rotate");
    await fetchData();
    setTimeout(() => btn.classList.remove("rotate"), 600);
}

// Optional: city selection panel (simple alert for now, but can be extended)
function toggleControls() {
    // Simple feedback – you can replace with a proper dropdown if needed
    alert("City selection is currently fixed to Ain Oussera, Algeria.\n(You can change the city in the fetch URL if needed.)");
}

// Initialize
function init() {
    updatePathLength();
    snapIconsToPath();
    fetchData();
    setInterval(updateWidget, 1000);
}

// Re-snap on resize
window.addEventListener('resize', () => {
    setTimeout(() => {
        updatePathLength();
        snapIconsToPath();
        updateWidget(); // redraw arc offset
    }, 100);
});

init();
</script>
</body>
</html>
